<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Evergreen 議論ダッシュボード</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; border-bottom: 3px solid #0056b3; padding-bottom: 10px; }
        button { padding: 10px 24px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }

        .agenda-block { margin-top: 24px; border: 1px solid #dde; border-radius: 8px; overflow: hidden; }
        .agenda-title { background: #0056b3; color: #fff; padding: 10px 16px; font-weight: bold; font-size: 1.05em; }
        .messages { padding: 12px 16px; }

        .message { display: flex; gap: 12px; margin-bottom: 10px; animation: fadein 0.3s ease; }
        .speaker-tag { font-weight: bold; min-width: 120px; color: #0056b3; flex-shrink: 0; }
        .bubble { background: #eaf5ff; border-left: 3px solid #007bff; padding: 8px 12px; border-radius: 4px; flex: 1; line-height: 1.6; }

        .thinking-row { color: #888; font-style: italic; padding: 4px 16px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

        .summary-block { margin: 8px 16px 16px; background: #e8f5e9; border-left: 3px solid #4caf50; padding: 10px 14px; border-radius: 4px; }
        .summary-block strong { color: #2e7d32; }

        .conclusion-block { margin-top: 28px; background: #fff3e0; border: 2px solid #ff9800; border-radius: 8px; padding: 16px; animation: fadein 0.4s ease; }
        .conclusion-block h2 { margin-top: 0; color: #e65100; }

        .status { margin: 12px 0; color: #555; font-style: italic; }
        .error { color: red; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Project "Evergreen" 議論ダッシュボード</h1>
    <p>バックエンドのAIエンジンが議論を実行し、その結果をリアルタイムで表示します。</p>

    <button id="runBtn" onclick="runDiscussion()">議論エンジンを実行する</button>
    <div class="status" id="status"></div>
    <div id="results"></div>
</div>

<script>
    let currentAgendaEl = null;

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    function getOrCreateAgendaBlock(item) {
        let id = 'agenda-' + btoa(encodeURIComponent(item)).replace(/[^a-z0-9]/gi, '');
        let el = document.getElementById(id);
        if (!el) {
            el = document.createElement('div');
            el.className = 'agenda-block';
            el.id = id;
            el.innerHTML = `<div class="agenda-title">${item}</div><div class="messages" id="${id}-msgs"></div>`;
            document.getElementById('results').appendChild(el);
        }
        currentAgendaEl = document.getElementById(id + '-msgs');
        return currentAgendaEl;
    }

    function appendMessage(container, speaker, response) {
        // Remove thinking indicator if present
        const thinking = container.querySelector('.thinking-row');
        if (thinking) thinking.remove();

        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<span class="speaker-tag">${speaker}</span><span class="bubble">${response.replace(/\n/g, '<br>')}</span>`;
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showThinking(container, speaker) {
        const existing = container.querySelector('.thinking-row');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'thinking-row';
        div.textContent = `${speaker} が考え中…`;
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function appendSummary(container, summary) {
        const div = document.createElement('div');
        div.className = 'summary-block';
        div.innerHTML = `<strong>まとめ：</strong> ${summary.replace(/\n/g, '<br>')}`;
        container.appendChild(div);
    }

    async function runDiscussion() {
        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        document.getElementById('results').innerHTML = '';
        currentAgendaEl = null;
        setStatus('接続中…');

        const es = new EventSource('/run_discussion');

        es.onmessage = (e) => {
            const data = JSON.parse(e.data);

            if (data.type === 'agenda_start') {
                setStatus(`議題 ${data.index}/5：${data.item}`);
                getOrCreateAgendaBlock(data.item);

            } else if (data.type === 'thinking') {
                if (currentAgendaEl) showThinking(currentAgendaEl, data.speaker);

            } else if (data.type === 'message') {
                const container = getOrCreateAgendaBlock(data.step);
                appendMessage(container, data.speaker, data.response);

            } else if (data.type === 'summarizing') {
                setStatus('まとめを生成中…');
                if (currentAgendaEl) {
                    const div = document.createElement('div');
                    div.className = 'thinking-row';
                    div.textContent = 'モデレーター がまとめ中…';
                    currentAgendaEl.appendChild(div);
                }

            } else if (data.type === 'summary') {
                if (currentAgendaEl) {
                    const thinking = currentAgendaEl.querySelector('.thinking-row');
                    if (thinking) thinking.remove();
                    appendSummary(currentAgendaEl, data.summary);
                }

            } else if (data.type === 'concluding') {
                setStatus('CEO が最終結論を起草中…');

            } else if (data.type === 'conclusion') {
                const div = document.createElement('div');
                div.className = 'conclusion-block';
                div.innerHTML = `<h2>総合まとめ（CEO）</h2><p>${data.text.replace(/\n/g, '<br>')}</p>`;
                document.getElementById('results').appendChild(div);
                div.scrollIntoView({ behavior: 'smooth' });

            } else if (data.type === 'done') {
                setStatus('議論が完了しました。');
                btn.disabled = false;
                es.close();
            }
        };

        es.onerror = () => {
            setStatus('');
            document.getElementById('results').insertAdjacentHTML('beforeend',
                '<p class="error">エラーが発生しました。サーバー（python3 app.py）とOllamaが起動しているか確認してください。</p>');
            btn.disabled = false;
            es.close();
        };
    }
</script>
</body>
</html>
